<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('dist/bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ static_url('css/admin.css') }}">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 15% 20%, rgba(37, 99, 235, 0.10), transparent 28%),
                radial-gradient(circle at 85% 10%, rgba(14, 165, 233, 0.08), transparent 24%),
                linear-gradient(180deg, #fbfcfe 0%, #f5f6f8 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .login-wrap {
            width: min(960px, calc(100vw - 32px));
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.10);
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
        }
        .login-hero {
            padding: 52px 48px;
            background: linear-gradient(160deg, rgba(37, 99, 235, 0.08), rgba(248, 250, 252, 0.95));
            border-right: 1px solid rgba(15, 23, 42, 0.06);
        }
        .login-hero .kicker { margin-bottom: 16px; }
        .login-hero h1 {
            font-size: 36px;
            line-height: 1.2;
            margin-bottom: 16px;
            font-weight: 800;
            color: #0f172a;
        }
        .login-hero p {
            color: #64748b;
            line-height: 1.85;
            margin: 0;
            max-width: 30rem;
        }
        .login-panel { padding: 42px 40px; }
        .login-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; color: #0f172a; }
        .login-subtitle { color: #64748b; margin-bottom: 24px; }
        .login-type-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
            padding: 6px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .login-type-tabs label {
            margin: 0;
            cursor: pointer;
        }
        .login-type-tabs input { display: none; }
        .login-type-tabs span {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 600;
            color: #64748b;
            transition: .2s ease;
        }
        .login-type-tabs input:checked + span {
            background: #fff;
            color: #2563eb;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.12);
        }
        @media (max-width: 900px) {
            .login-wrap { grid-template-columns: 1fr; }
            .login-hero { display: none; }
            .login-panel { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <section class="login-hero">
            <div class="kicker"><i class="fas fa-star me-2"></i> cnAgentOS</div>
            <h1>欢迎登录<br>智能瞭望与问数平台</h1>
            <p>请选择登录身份：普通用户进入用户门户，管理员（含超级管理员与普通管理员）进入后台工作台。</p>
        </section>
        <section class="login-panel">
            <div class="login-title">账号登录</div>
            <div class="login-subtitle">请输入账号和密码完成身份验证</div>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% end %}

            <form method="post" action="/auth/login" id="loginForm">
                {% module xsrf_form_html() %}
                <input type="hidden" name="login_type" id="loginTypeInput" value="{{ login_type }}">

                <div class="login-type-tabs">
                    <label>
                        <input type="radio" name="login_type_ui" value="user" {% if login_type == 'user' %}checked{% end %}>
                        <span><i class="fas fa-user"></i>普通用户</span>
                    </label>
                    <label>
                        <input type="radio" name="login_type_ui" value="admin" {% if login_type == 'admin' %}checked{% end %}>
                        <span><i class="fas fa-user-shield"></i>管理员</span>
                    </label>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">用户名</label>
                    <input class="form-control form-control-lg" name="username" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">密码</label>
                    <input class="form-control form-control-lg" type="password" name="password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">进入系统</button>
            </form>
        </section>
    </div>

    <script>
        const loginTypeInput = document.getElementById('loginTypeInput');
        const submitBtn = document.getElementById('submitBtn');
        const radios = document.querySelectorAll('input[name="login_type_ui"]');

        function syncLoginType() {
            const selected = document.querySelector('input[name="login_type_ui"]:checked');
            const value = selected ? selected.value : 'user';
            loginTypeInput.value = value;
            submitBtn.textContent = value === 'admin' ? '进入管理后台' : '进入用户首页';
        }

        radios.forEach(radio => radio.addEventListener('change', syncLoginType));
        syncLoginType();
    </script>
</body>
</html>
