<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('dist/bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ static_url('css/admin.css') }}">
    <style>
        body { background:#f5f6f8; color:#1f2937; }
        .page-shell{display:flex;min-height:100vh;background:#f5f6f8;}
        .sidebar{width:260px;background:#fff;border-right:1px solid #e5e7eb;}
        .main{flex:1;padding:28px;}
        .hero,.panel,.card-soft{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 10px 30px rgba(15,23,42,.04);}
        .hero{padding:24px;margin-bottom:18px}.panel,.card-soft{padding:22px;margin-bottom:18px}
        .badge-soft{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:#f3f4f6;color:#4b5563;font-size:13px}
        .muted{color:#6b7280}.subtitle{color:#6b7280}.nav-card a.active{background:#f3f4f6;border-color:#e5e7eb}.nav-card a:hover{background:#f9fafb}
    </style>
</head>
<body class="admin-shell">
<div class="page-shell">
{% set active_page = 'permissions' %}
{% include "_sidebar.html" %}
    <main class="main"><div class="hero"><div class="d-flex justify-content-between align-items-center flex-wrap gap-3"><div><div class="badge-soft mb-2">权限管理</div><h1 class="title-large mb-2">权限管理</h1><div class="subtitle">管理菜单、按钮等权限项</div></div></div></div><div class="panel"><div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>ID</th><th>菜单组</th><th>名称</th><th>编码</th><th>排序</th></tr></thead><tbody>{% for p in permissions %}<tr><td class="text-secondary">#{{ p['id'] }}</td><td>{{ p['menu_group'] }}</td><td class="fw-semibold">{{ p['name'] }}</td><td><span class="badge-soft">{{ p['code'] }}</span></td><td>{{ p['sort_no'] }}</td></tr>{% end %}</tbody></table></div></div></main></div></body></html>
