<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('dist/layui-v2.13.6/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('css/admin.css') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            background:
                radial-gradient(circle at 20% 20%, rgba(37, 99, 235, .16), transparent 24%),
                radial-gradient(circle at 80% 0%, rgba(15, 23, 42, .08), transparent 18%),
                linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
            overflow: hidden;
        }
        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(22px);
            opacity: .7;
            animation: drift 12s ease-in-out infinite alternate;
        }
        body::before {
            left: -120px;
            top: -100px;
            background: radial-gradient(circle, rgba(59,130,246,.16), transparent 64%);
        }
        body::after {
            right: -140px;
            bottom: -120px;
            background: radial-gradient(circle, rgba(15,23,42,.10), transparent 66%);
            animation-duration: 16s;
        }
        @keyframes drift {
            from { transform: translate3d(0,0,0) scale(1); }
            to { transform: translate3d(24px, -18px, 0) scale(1.05); }
        }
        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            position: relative;
            z-index: 1;
        }
        .login-card {
            width: min(100%, 480px);
            background: rgba(255,255,255,.92);
            border: 1px solid rgba(15,23,42,.08);
            border-radius: 22px;
            box-shadow: 0 24px 80px rgba(15,23,42,.10);
            padding: 34px 30px 28px;
            backdrop-filter: blur(16px);
            animation: rise 700ms ease-out both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(18px) scale(.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .brand-name {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            margin: 0 0 12px;
            letter-spacing: .12em;
            text-transform: uppercase;
            text-align: center;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #222;
            margin: 0 0 18px;
            text-align: center;
        }
        .divider {
            height: 1px;
            background: #e5e5e5;
            margin: 0 0 18px;
        }
        .field-stack {
            border: 1px solid #e5e5e5;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 18px;
            background: #fff;
        }
        .field-row {
            display: flex;
            align-items: center;
            min-height: 62px;
            border-bottom: 1px solid #e5e5e5;
            padding: 0 14px;
        }
        .field-row:last-child { border-bottom: 0; }
        .field-icon {
            width: 24px;
            margin-right: 12px;
            color: #c9c9c9;
            text-align: center;
            font-size: 20px;
            flex: 0 0 24px;
        }
        .field-input {
            flex: 1;
            border: 0;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #333;
            height: 60px;
        }
        .field-input::placeholder { color: #a8a8a8; }
        .remember-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
            color: #666;
            font-size: 14px;
        }
        .remember-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .remember-item input { width: 18px; height: 18px; }
        .layui-btn.login-btn {
            width: 100%;
            height: 52px;
            border-radius: 2px;
            font-size: 20px;
            font-weight: 700;
            background: #117ec2;
        }
        .alert-box {
            padding: 12px 14px;
            border-radius: 6px;
            margin: 0 0 16px;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #cf1322;
            font-size: 14px;
        }
        .footer-note {
            margin-top: 14px;
            text-align: center;
            color: #9a9a9a;
            font-size: 12px;
        }
        @media (max-width: 520px) {
            .login-card { padding: 28px 18px 22px; }
            .login-title { font-size: 24px; }
            .field-row { min-height: 56px; }
            .field-input { font-size: 15px; height: 54px; }
        }
    </style>
</head>
<body>
<div class="login-shell">
    <div class="login-card">
        <div class="brand-name">cnAgentOS</div>
        <div class="login-title">管理员登录</div>
        <div class="divider"></div>

        {% if error %}
        <div class="alert-box">{{ error }}</div>
        {% end %}

        <form method="post" action="/admin/login">
            {% module xsrf_form_html() %}
            <div class="field-stack">
                <div class="field-row">
                    <div class="field-icon"><i class="layui-icon layui-icon-username"></i></div>
                    <input class="field-input" type="text" name="username" placeholder="请输入用户名" autocomplete="off">
                </div>
                <div class="field-row">
                    <div class="field-icon"><i class="layui-icon layui-icon-password"></i></div>
                    <input class="field-input" type="password" name="password" placeholder="请输入密码" autocomplete="off">
                </div>
            </div>

            <div class="remember-row">
                <label class="remember-item"><input type="checkbox" checked>记住用户名</label>
            </div>

            <button type="submit" class="layui-btn login-btn">登录</button>
        </form>

        <div class="footer-note">cnAgentOS · AI 智能瞭望与智能问数系统</div>
    </div>
</div>
<script src="{{ static_url('dist/layui-v2.13.6/layui.js') }}"></script>
</body>
</html>
